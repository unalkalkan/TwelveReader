version: "3.9"

# Development docker-compose configuration
# Usage: docker compose -f docker-compose.dev.yaml up

services:
  qwen3-tts:
    build:
      context: ./qwen3-tts
      dockerfile: Dockerfile
    container_name: twelvereader-qwen3-tts-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - REQUIRE_CUDA=1
      - HF_HOME=/data/hf
      - TRANSFORMERS_CACHE=/data/hf/transformers
      - HF_HUB_CACHE=/data/hf/hub
    volumes:
      - hf-cache:/data/hf
    gpus: all
    networks:
      - twelvereader-network

  # Backend server with hot reload via volume mount
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: twelvereader-backend-dev
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - ./config/docker.yaml:/app/config/config.yaml:ro
      - twelvereader-data:/tmp/twelvereader
    environment:
      - TR_LLM_OPENAI_API_KEY=${TR_LLM_OPENAI_API_KEY:-}
      - TR_TTS_OPENAI_API_KEY=${TR_TTS_OPENAI_API_KEY:-}
      - TR_TTS_QWEN3_API_KEY=${TR_TTS_QWEN3_API_KEY:-}
    working_dir: /app
    command: go run ./cmd/server -config /app/config/config.yaml
    depends_on:
      - qwen3-tts
    networks:
      - twelvereader-network

  # Frontend development server with hot reload
  frontend:
    image: node:22-alpine
    container_name: twelvereader-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./web-client:/app
      - node-modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && npx expo start --web --host 0.0.0.0 --port 3000"
    environment:
      - EXPO_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - twelvereader-network

volumes:
  twelvereader-data:
    driver: local
  go-mod-cache:
    driver: local
  node-modules:
    driver: local
  hf-cache:
    driver: local

networks:
  twelvereader-network:
    driver: bridge
