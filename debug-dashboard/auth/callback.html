<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in...</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1a1b1e; color: #e4e5e7; }
    .container { text-align: center; max-width: 420px; padding: 2rem; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #9ca3af; margin-bottom: 1.5rem; }
    .error { color: #ef4444; background: rgba(239,68,68,0.1); padding: 0.75rem 1rem; border-radius: 0.375rem; margin-top: 1rem; font-size: 0.875rem; }
    a { color: #3b82f6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading">
      <div class="spinner"></div>
      <h1>Verifying magic link...</h1>
      <p>Please wait while we authenticate you.</p>
    </div>
    <div id="error" style="display:none">
      <h1>Authentication failed</h1>
      <p id="error-msg"></p>
      <a href="/#/login">Back to login page</a>
    </div>
  </div>

  <script>
    (function() {
      // Get token from URL query param (?token=XXX)
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        showError('No magic link token found in URL. Please use the login page.');
        return;
      }

      // Call the backend verify endpoint (same origin, no CORS issues)
      fetch('/api/v1/auth/verify?token=' + encodeURIComponent(token), {
        method: 'GET',
        headers: { 'Cache-Control': 'no-store' },
      })
      .then(function(response) {
        if (!response.ok) {
          return response.json().then(function(err) {
            throw new Error(err.error || 'Verification failed: ' + response.status);
          });
        }
        return response.json();
      })
      .then(function(data) {
        // Build a redirect URL to the dashboard SPA with auth data in hash
        // Format: #/dashboard?session=XXX&refresh=YYY&user=ZZZ
        var userJson = encodeURIComponent(JSON.stringify({
          id: data.user.id,
          email: data.user.email,
          name: data.user.name,
          role_name: data.user.role_name || 'user',
        }));
        // Redirect to dashboard SPA callback route with auth data in hash
        var dashboardUrl = '/#/callback?session=' + encodeURIComponent(data.session_token) + '&refresh=' + encodeURIComponent(data.refresh_token) + '&user=' + userJson;
        window.location.replace(dashboardUrl);
      })
      .catch(function(err) {
        showError(err.message || 'Failed to verify magic link. The token may have expired.');
      });

      function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error-msg').textContent = msg;
      }
    })();
  </script>
</body>
</html>
