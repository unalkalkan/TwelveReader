version: "3.9"

services:
  qwen3-tts:
    build:
      context: ./qwen3-tts
      dockerfile: Dockerfile
    container_name: twelvereader-qwen3-tts
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - REQUIRE_CUDA=1
      - HF_HOME=/data/hf
      - TRANSFORMERS_CACHE=/data/hf/transformers
      - HF_HUB_CACHE=/data/hf/hub
    volumes:
      - hf-cache:/data/hf
    # gpus: all
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
    networks:
      - twelvereader-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twelvereader-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - twelvereader-data:/app/data
    environment:
      # LLM Provider API Keys
      - TR_LLM_OPENAI_API_KEY=${TR_LLM_OPENAI_API_KEY:-}
      # TTS Provider API Keys
      - TR_TTS_OPENAI_API_KEY=${TR_TTS_OPENAI_API_KEY:-}
      - TR_TTS_QWEN3_API_KEY=${TR_TTS_QWEN3_API_KEY:-}
      # S3 Storage (if using S3 adapter)
      # - TR_STORAGE_S3_ACCESS_KEY_ID=${TR_STORAGE_S3_ACCESS_KEY_ID:-}
      # - TR_STORAGE_S3_SECRET_ACCESS_KEY=${TR_STORAGE_S3_SECRET_ACCESS_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - qwen3-tts
    networks:
      - twelvereader-network

  frontend:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    container_name: twelvereader-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - EXPO_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - twelvereader-network

volumes:
  twelvereader-data:
    driver: local
  hf-cache:
    driver: local

networks:
  twelvereader-network:
    driver: bridge
